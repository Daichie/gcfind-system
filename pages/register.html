<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GCFind | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { boxShadow: { soft: "0 10px 30px rgba(15, 23, 42, 0.08)" } } } };
    </script>
    <link rel="stylesheet" href="../assets/css/base.css?v=8.31" />
    <link rel="stylesheet" href="../assets/css/pages/auth.css?v=8.31" />
    <link rel="icon" type="image/png" href="../assets/img/gcfind-logo-transparent.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" referrerpolicy="no-referrer" />
  </head>

  <body class="min-h-screen auth-bg">
    <main class="min-h-screen grid place-items-center px-4 py-10">
      <section class="w-full max-w-lg auth-card-wrap">
        <div class="auth-orb auth-orb-one"></div>
        <div class="auth-orb auth-orb-two"></div>

        <div class="auth-card rounded-3xl bg-white/95 ring-1 ring-slate-200 overflow-hidden backdrop-blur">
          <div class="p-7 sm:p-8">
            <div class="flex flex-col items-center text-center">
              <span class="inline-flex items-center gap-2 rounded-full bg-emerald-50 px-4 py-1.5 text-sm font-semibold text-emerald-700 ring-1 ring-emerald-200">
                <i class="fa-solid fa-building-columns"></i>
                Gordon College
              </span>

              <img src="../assets/img/gcfind-logo-transparent.png" alt="GCFind logo" class="mt-5 h-20 w-20 shadow-sm logo-float site-logo" />

              <h1 class="mt-4 text-3xl font-extrabold tracking-tight text-slate-900">Create Account</h1>
              <p class="mt-1 text-sm text-slate-600">Join the GCFind Lost and Found Portal</p>
              <p class="mt-1 text-xs text-slate-500">For Gordon College students, faculty, and staff only.</p>
            </div>

            <form id="registerForm" class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="sm:col-span-2">
                <label for="regName" class="text-sm font-semibold text-slate-700">Full Name</label>
                <div class="mt-1 relative">
                  <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input id="regName" type="text" class="w-full rounded-2xl bg-white pl-11 pr-4 py-3 text-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-emerald-500" placeholder="Enter your full name" required />
                </div>
              </div>

              <div class="sm:col-span-2">
                <label for="regEmail" class="text-sm font-semibold text-slate-700">Email</label>
                <div class="mt-1 relative">
                  <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input id="regEmail" type="email" class="w-full rounded-2xl bg-white pl-11 pr-4 py-3 text-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-emerald-500" placeholder="you@gordoncollege.edu.ph" required />
                </div>
              </div>

              <div class="sm:col-span-2">
                <label for="regPassword" class="text-sm font-semibold text-slate-700">Password</label>
                <div class="mt-1 relative">
                  <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input id="regPassword" type="password" class="w-full rounded-2xl bg-white pl-11 pr-4 py-3 text-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-emerald-500" placeholder="Password" required />
                </div>
                <div id="regPasswordStrength" class="gc-password-strength gc-password-strength-empty mt-2" aria-live="polite">
                  <div class="gc-password-strength-track"><span></span></div>
                  <div class="gc-password-strength-label">Enter a password</div>
                </div>
              </div>

              <div class="sm:col-span-2">
                <label for="regConfirmPassword" class="text-sm font-semibold text-slate-700">Confirm Password</label>
                <div class="mt-1 relative">
                  <i class="fa-solid fa-shield-halved absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input id="regConfirmPassword" type="password" class="w-full rounded-2xl bg-white pl-11 pr-4 py-3 text-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-emerald-500" placeholder="Confirm password" required />
                </div>
              </div>

              <div>
                <label for="regRole" class="text-sm font-semibold text-slate-700">Role</label>
                <div class="mt-1 relative">
                  <i class="fa-solid fa-id-badge absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <select id="regRole" class="w-full rounded-2xl bg-white pl-11 pr-4 py-3 text-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-emerald-500">
                    <option value="student">Student</option>
                    <option value="faculty_staff">Faculty / Staff</option>
                  </select>
                </div>
              </div>

              <div>
                <label for="regDepartment" class="text-sm font-semibold text-slate-700">Department</label>
                <div class="mt-1 relative">
                  <i class="fa-solid fa-building absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input id="regDepartment" type="text" class="w-full rounded-2xl bg-white pl-11 pr-4 py-3 text-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-emerald-500" placeholder="e.g., CCS" />
                </div>
              </div>

              <div class="sm:col-span-2">
                <button type="submit" class="w-full inline-flex items-center justify-center gap-2 rounded-2xl bg-emerald-600 px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700 active:scale-[.99] transition-all">
                  <i class="fa-solid fa-user-plus"></i>
                  Register Account
                </button>
              </div>
            </form>
          </div>

          <div class="border-t border-slate-200 bg-slate-50 px-7 py-5 sm:px-8">
            <div class="flex flex-col items-center justify-center gap-2 text-center">
              <p class="text-sm text-slate-600">
                Already have an account?
                <a href="login.html" class="font-semibold text-emerald-600 hover:text-emerald-700 hover:underline">
                  Sign in here
                </a>
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase/supabase-config.js"></script>
    <script src="../assets/js/modules/core.js?v=3.77"></script>
    <script src="../assets/js/modules/auth.js?v=3.79"></script>
    <script src="../assets/js/modules/items.js"></script>
    <script src="../assets/js/modules/admin.js?v=3.76"></script>
    <script src="../assets/js/modules/init.js"></script>
      <script src="../assets/js/gcfind-hotfix-v260.js?v=2.60"></script>
</body>
</html>
