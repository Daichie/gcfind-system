<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GCFind | Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { boxShadow: { soft: "0 10px 30px rgba(15, 23, 42, 0.08)" } } } };</script>
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/pages/auth.css" />
    <link rel="icon" type="image/png" href="../assets/img/gcfind-logo-transparent.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" referrerpolicy="no-referrer" />
    <style>
      /* Hide browser-native password reveal controls so only GCFind eye button appears. */
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear { display: none; }
      input[type="password"]::-webkit-credentials-auto-fill-button,
      input[type="password"]::-webkit-caps-lock-indicator { visibility: hidden; display: none !important; pointer-events: none; }
    </style>
  </head>
  <body class="min-h-screen auth-bg">
    <main class="min-h-screen grid place-items-center px-4 py-10 relative overflow-hidden">
      <section class="w-full max-w-md auth-card-wrap">
        <div class="auth-orb auth-orb-one"></div>
        <div class="auth-orb auth-orb-two"></div>
        <div class="auth-card rounded-3xl bg-white/95 ring-1 ring-slate-200 overflow-hidden backdrop-blur">
          <div class="p-8 sm:p-10">
            <div class="flex flex-col items-center text-center">
              <span class="auth-badge"><i class="fa-solid fa-key"></i> Account Recovery</span>
              <img src="../assets/img/gcfind-logo-transparent.png" alt="GCFind logo" class="mt-4 h-20 w-20 shadow-sm logo-float site-logo" />
              <h1 class="mt-4 text-3xl font-extrabold tracking-tight text-slate-900">Reset Password</h1>
              <p class="mt-1 text-sm text-slate-600">Create a new password for your GCFind account.</p>
            </div>

            <div id="resetLinkStatus" class="mt-5 rounded-2xl bg-emerald-50 p-3 text-sm text-emerald-800 ring-1 ring-emerald-100">
              Checking reset link...
            </div>

            <form id="resetPasswordForm" class="mt-5 space-y-4 hidden">
              <div>
                <label for="newPassword" class="text-sm font-semibold text-slate-700">New Password</label>
                <div class="mt-1 relative">
                  <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input id="newPassword" type="password" class="w-full rounded-2xl bg-white pl-11 pr-12 py-3 text-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-emerald-500" placeholder="Enter new password" autocomplete="new-password" required />
                  <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emerald-700" data-toggle-password="newPassword" aria-label="Show or hide password"><i class="fa-regular fa-eye"></i></button>
                </div>
              </div>
              <div>
                <label for="confirmNewPassword" class="text-sm font-semibold text-slate-700">Confirm Password</label>
                <div class="mt-1 relative">
                  <i class="fa-solid fa-shield-halved absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input id="confirmNewPassword" type="password" class="w-full rounded-2xl bg-white pl-11 pr-12 py-3 text-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-emerald-500" placeholder="Confirm new password" autocomplete="new-password" required />
                  <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emerald-700" data-toggle-password="confirmNewPassword" aria-label="Show or hide password"><i class="fa-regular fa-eye"></i></button>
                </div>
              </div>
              <p id="resetPasswordError" class="text-sm font-medium text-red-600"></p>
              <button type="submit" class="w-full inline-flex items-center justify-center gap-2 rounded-2xl bg-emerald-600 px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700 active:scale-[.99] transition-all">
                <i class="fa-solid fa-check"></i> Update Password
              </button>
            </form>
          </div>
          <div class="border-t border-slate-200 bg-slate-50 px-7 py-5 sm:px-8 text-center">
            <a href="login.html" class="text-sm font-semibold text-emerald-700 hover:text-emerald-800">Back to login</a>
          </div>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase/supabase-config.js"></script>
    <script src="../assets/js/modules/core.js"></script>
    <script src="../assets/js/modules/auth.js"></script>
    <script src="../assets/js/modules/init.js"></script>
  </body>
</html>
