<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  </head>
  <body class="min-h-screen" data-page="details" data-requires-role="user">
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-200">
      <nav class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
        <div class="flex flex-wrap items-center justify-between gap-3 py-3">
          <a href="dashboard.html" data-home-link class="header-brand flex items-center gap-3">
            <img src="../assets/img/gcfind-logo-transparent.png" alt="GCFind logo" class="site-logo h-10 w-10" />
            <div class="leading-tight">

          </a>
